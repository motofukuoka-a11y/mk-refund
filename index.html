<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#111827"><title>MK払戻</title><link rel="stylesheet" href="./styles.css"></head>
<body><header><div><small>MARS KILLER</small><h1>MK払戻</h1><p>JR北海道 払戻計算支援</p></div><button id="theme" class="sub" type="button">表示切替</button></header>
<main><section class="card"><h2>払戻条件</h2><p class="muted">必要事項を入力し、「検索・計算」を押してください。</p><form id="form">
<div class="grid"><label>発駅<input id="from" list="stations" required placeholder="例：札幌"></label><label>着駅<input id="to" list="stations" required placeholder="例：函館"></label></div>
<label>経由駅<input id="via" placeholder="複数は「,」または「、」で区切る"></label>
<div class="grid"><label>券種<select id="type" required><option value="">選択してください</option><option value="ordinary">普通乗車券</option><option value="unreserved">自由席特急券</option><option value="reserved">指定席特急券</option><option value="green">指定席特急券＋グリーン券</option><option value="unassigned">座席未指定券</option><option value="commuter">定期乗車券</option><option value="coupon">普通回数乗車券</option></select></label><label>旅客区分<select id="passenger"><option value="adult">大人</option><option value="child">小児</option></select></label></div>
<div class="grid"><label>乗車日<input id="travel" type="date" required></label><label>申出日時<input id="request" type="datetime-local" required></label></div>
<div id="departureBox" class="conditional hidden"><label>列車出発日時<input id="departure" type="datetime-local"></label></div>
<div id="commuterBox" class="conditional hidden"><div class="grid"><label>有効期間開始日<input id="commuterStart" type="date"></label><label>券面金額<input id="commuterPrice" type="number" min="0" step="10" placeholder="円"></label></div></div>
<div id="couponBox" class="conditional hidden"><div class="grid"><label>総券片数<input id="couponTotal" type="number" min="1" value="11"></label><label>使用済枚数<input id="couponUsed" type="number" min="0" value="0"></label></div></div>
<div class="actions"><button>検索・計算</button><button id="clear" class="sub" type="button">クリア</button></div></form><datalist id="stations"></datalist></section>
<section id="result" class="card hidden"><span id="status" class="badge"></span><h2>計算結果</h2><div id="metrics" class="metrics"></div><h3>計算式</h3><pre id="formula"></pre><h3>判定理由・注意事項</h3><p id="reason" class="reason"></p><details><summary>経路明細</summary><div id="route"></div></details></section></main>
<footer>本サイトは営業取扱いの確認を支援する試作ツールです。最終判断は正式な規程・資料に基づいてください。</footer><script type="module" src="./app.js"></script></body></html>
